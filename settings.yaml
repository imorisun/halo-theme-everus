apiVersion: v1alpha1
kind: Setting
metadata:
  name: halo-theme-everus-setting
spec:
  forms:
    # ────────── 样式 ──────────
    - group: style
      label: 样式与字体
      formSchema:
        - $formkit: text
          name: custom_font
          label: 自定义字体URL
          value: ""
          help: "输入字体文件的URL地址，留空则使用默认系统字体。支持 woff2、woff、ttf、eot、svg 格式"

    # ────────── 首页 ──────────
    - group: homepage
      label: 首页
      formSchema:
        - $formkit: attachment
          name: banner_image
          label: Banner 背景图
          value: ""
          help: "首页顶部Banner的背景图片，留空则使用默认暗色渐变"

    # ────────── 页脚 ──────────
    - group: footer
      label: 页脚
      formSchema:
        - $formkit: text
          name: custom_text
          label: 自定义页脚文字
          value: ""
          help: "留空则显示默认版权文字"
        - $formkit: text
          name: icp
          label: ICP 备案号
          value: ""
          help: "仅输入备案号，如：京ICP备2024XXXXXX号-1"
        - $formkit: text
          name: gongan
          label: 公安备案号
          value: ""
          help: "仅输入备案号，如：京公网安备 11010102000001号"

    # ────────── 作者页 ──────────
    - group: author
      label: 作者页
      formSchema:
        - $formkit: switch
          name: show_email
          label: 公开显示邮箱
          value: true
          help: "在作者页面侧边栏中显示邮箱信息"
        - $formkit: switch
          name: show_phone
          label: 公开显示手机号
          value: false
          help: "在作者页面侧边栏中显示手机号信息"

    # ────────── 音乐 ──────────
    - group: music
      label: 音乐播放器
      formSchema:
        - $formkit: textarea
          name: custom_playlist
          label: 自定义歌单
          value: ""
          help: |
            格式：歌名 | 歌手 | 音频直链 | 封面直链
            每行一首歌曲，优先于平台歌单
            示例：晴天 | 周杰伦 | https://example.com/qingtian.mp3 | https://example.com/cover.jpg
        - $formkit: text
          name: music_id
          label: 平台歌单 ID
          value: ""
          help: "网易云/QQ音乐歌单ID，若填写自定义歌单则此项无效"
        - $formkit: select
          name: platform
          label: 音乐平台
          value: "netease"
          options:
            - label: 网易云音乐
              value: netease
            - label: QQ音乐
              value: tencent
