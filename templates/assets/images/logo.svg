<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="everus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26a760"/>
      <stop offset="100%" stop-color="#1dd17a"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="96" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

  <!-- 外环 -->
  <circle cx="95" cy="95" r="48" fill="none" stroke="url(#everus-grad)" stroke-width="2.8" opacity="0.9"/>

  <!-- 内环（偏移，形成交集） -->
  <circle cx="110" cy="105" r="36" fill="none" stroke="url(#everus-grad)" stroke-width="2.2" opacity="0.5"/>

  <!-- 中心圆点 -->
  <circle cx="102" cy="100" r="5" fill="#1dd17a"/>

  <!-- 装饰小点：外环轨道上的卫星点 -->
  <circle cx="143" cy="82" r="3" fill="#1dd17a" opacity="0.7"/>
  <circle cx="68" cy="130" r="2.5" fill="#1dd17a" opacity="0.5"/>
</svg>
