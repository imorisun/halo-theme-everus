<!DOCTYPE html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{layout :: html(head = null,content = ~{::content})}"
>
  <th:block th:fragment="content">
    <div class="page-content">
      <!-- Banner -->
      <header class="banner banner--love" th:style="'background-image:url(' + ${#strings.isEmpty(theme.config?.homepage?.banner_image) ? #theme.assets('/images/bg.jpg') : theme.config?.homepage?.banner_image} + ');background-size:cover;'">
        <div class="banner-overlay"></div>
      </header>

      <!-- 主内容区 -->
      <div class="cat-group">
        <ul class="cat-group__list">

          <!-- 最新文章 -->
          <li class="cat-group__item">
            <header class="cat-header up">
              <h2 class="cat-header__title">最新文章</h2>
              <div class="cat-header__line"></div>
              <span class="cat-header__count"></span>
            </header>

            <ul class="cat-posts">
              <th:block th:if="${posts?.items != null and not posts.items.isEmpty()}">
                <li class="cat-posts__item up" th:each="post,iterStat : ${posts.items}">
                  <h3 class="line-clamp">
                    <span class="accent"></span>
                    <a class="link hover-link" th:href="@{${post?.status?.permalink}}" th:text="${post?.spec?.title}"></a>
                  </h3>
                  <p class="line-clamp" th:if="${post?.status?.excerpt}" th:text="${post?.status?.excerpt}"></p>
                  <a class="link hover-link" th:href="@{${post?.status?.permalink}}">展开我的故事</a>
                </li>
                <li class="cat-posts__more">
                  <a th:href="@{/archives}" class="more-link">
                    <span>全部文章</span>
                    <span class="more-link__count"><em th:text="${posts?.total ?: 0}"></em> 篇</span>
                    <i class="Nug Nug-youbian"></i>
                  </a>
                </li>
              </th:block>
              <li th:unless="${posts?.items != null and not posts.items.isEmpty()}" class="empty-state">
                开始写下你的第一篇故事吧。
              </li>
            </ul>
          </li>

          <!-- 最新动态（瞬间插件） -->
          <th:block th:if="${momentFinder != null}">
            <th:block th:with="homeMoments=${momentFinder.list(1, 6)}">
              <li class="cat-group__item" th:if="${homeMoments?.items != null and not homeMoments.items.isEmpty()}">
                <header class="cat-header up">
                  <h2 class="cat-header__title">最新动态</h2>
                  <div class="cat-header__line"></div>
                  <span class="cat-header__count"></span>
                </header>

                <ul class="home-moments">
                  <li class="home-moment" th:each="moment : ${homeMoments.items}" th:with="content=${moment?.spec?.content}">
                    <div class="home-moment__inner up">
                      <div class="home-moment__user">
                        <img class="home-moment__avatar"
                             th:src="${moment?.owner?.avatar ?: #theme.assets('/images/avatar.jpg')}"
                             th:alt="${moment?.owner?.displayName ?: '用户'}" />
                        <span class="home-moment__name" th:text="${moment?.owner?.displayName ?: '用户'}"></span>
                        <time class="home-moment__time" th:if="${moment.spec?.releaseTime}"
                              th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy-MM-dd HH:mm')}"></time>
                      </div>
                      <div class="home-moment__text" th:if="${content != null and not #strings.isEmpty(content?.html)}"
                           th:utext="${content.html}"></div>
                      <div class="home-moment__photos" th:if="${content?.medium != null and not #lists.isEmpty(content.medium)}">
                        <th:block th:each="media : ${content.medium}">
                          <img th:if="${media?.type?.name() == 'PHOTO'}"
                               th:src="${media?.url}"
                               class="home-moment__photo"
                               loading="lazy" />
                        </th:block>
                      </div>

                      <!-- 互动 -->
                      <div class="home-moment__actions">
                        <button class="home-moment__action home-moment__action--like" th:attr="onclick=|handleMomentUpvote(this, '${moment?.metadata?.name}')|">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                          <span th:attr="data-upvote-moment-name=|${moment?.metadata?.name}|" th:text="${moment?.stats?.upvote ?: 0}"></span>
                        </button>
                        <button class="home-moment__action" th:attr="onclick=|toggleMomentComments('${moment?.metadata?.name}')|">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                          <span th:text="${moment?.stats?.totalComment ?: 0}"></span>
                        </button>
                      </div>
                      <div class="home-moment__comments" th:id="|moment-comments-${moment?.metadata?.name}|">
                        <halo:comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}" />
                      </div>
                    </div>
                  </li>

                  <!-- 查看更多 -->
                  <li class="cat-posts__more" th:if="${homeMoments?.total > 6}">
                    <a th:href="@{/moments}" class="more-link">
                      <span>全部动态</span>
                      <span class="more-link__count"><em th:text="${homeMoments.total}"></em> 条</span>
                      <i class="Nug Nug-youbian"></i>
                    </a>
                  </li>
                </ul>
              </li>
            </th:block>
          </th:block>

          <!-- 结语引用 -->
          <li class="cat-group__item">
            <header>
              <div class="cat-header__line"></div>
              <p class="cat__quote up">一片心意，一点梦想，一段生活——感谢阅读。故事还在 <a th:href="@{/}" class="text-link" th:text="${site.title}"></a> 继续，期待你的陪伴。</p>
            </header>
          </li>
        </ul>
      </div>
    </div>
  </th:block>
</html>
