<!doctype html>
<html
  lang="zh-CN"
  xmlns:th="https://www.thymeleaf.org"
  th:fragment="html (head,content)"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=0" />
    <meta name="keywords" th:content="${site.seo.keywords}" />
    <th:block th:if="${#strings.isEmpty(site.logo)}">
      <link rel="shortcut icon" th:href="@{/assets/images/favicon.ico}" />
      <link rel="bookmark" th:href="@{/assets/images/favicon.ico}" />
      <link rel="apple-touch-icon" sizes="180x180" th:href="@{/assets/images/avatar.jpg}" />
    </th:block>
    <th:block th:unless="${#strings.isEmpty(site.logo)}">
      <link rel="shortcut icon" th:href="${site.logo}" />
      <link rel="bookmark" th:href="${site.logo}" />
      <link rel="apple-touch-icon" sizes="180x180" th:href="${site.logo}" />
    </th:block>

    <title th:text="${site.title}"></title>

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/assets/css/icon.css?v={v}(v=${theme.spec.version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/style.css?v={v}(v=${theme.spec.version})}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.36/dist/fancybox/fancybox.css" />

    <!-- Custom font -->
    <th:block th:if="${theme.config.style.custom_font}">
      <style th:inline="text">
        @font-face {
          font-family: 'wodeziti';
          font-weight: 400;
          font-style: normal;
          font-display: swap;
          src: url('[[${theme.config.style.custom_font}]]');
        }
        body {
          font-family: 'wodeziti';
          font-weight: 400;
        }
      </style>
    </th:block>

    <th:block th:if="${head != null}">
      <th:block th:replace="${head}" />
    </th:block>
  </head>

  <body class="dark">
    <!-- Navigation -->
    <div th:with="menu = ${menuFinder.getPrimary()}">
      <div class="site-nav">
        <div class="site-nav__inner">
          <nav class="site-nav__menu" role="navigation">
            <ul class="site-nav__dropdown site-nav__dropdown--cat">
              <li class="site-nav__dropdown-item">
                <a class="site-nav__dropdown-link" th:href="@{/}">首页</a>
              </li>
              <th:block th:if="${menu != null}">
                <li class="site-nav__dropdown-item" th:each="item : ${menu.menuItems}">
                  <a th:href="${item?.status?.href}"
                     class="site-nav__dropdown-link"
                     th:text="${item?.status?.displayName}"></a>
                </li>
              </th:block>
            </ul>
            <button class="daohang">
              <i class="Nug Nug-daohang"></i>
            </button>
          </nav>

          <div class="site-nav__actions">
            <button class="huojian__toggle hidden">
              <i class="Nug Nug-huojian"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <div id="swup" class="content transition-fade">
      <th:block th:replace="${content}" />
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-content">
        <div class="footer-copyright" th:text="${#dates.year(#dates.createNow())} + '. 保留所有权利。'"></div>
        <div class="footer-credit">
          设计：<a th:href="@{/}" class="text-link" th:text="${site.title}"></a>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0.36/dist/fancybox/fancybox.umd.js"></script>
    <script src="https://unpkg.com/swup@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css" />
    <script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <script th:src="@{/assets/js/main.js?v={v}(v=${theme.spec.version})}"></script>

    <halo:footer />
  </body>
</html>
